<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELIANCE - Fashion Management System</title>
    <meta name="description" content="Premium Clothing Business Management System" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; padding: 0; }
      #app-loader {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #171717 50%, #0a0a0a 100%);
        font-family: 'Inter', system-ui, sans-serif;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #app-loader.loaded { opacity: 0; visibility: hidden; pointer-events: none; }
      #app-loader .loader-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 32px; font-weight: 700; letter-spacing: 8px;
        color: #ffffff; margin-bottom: 8px;
        text-transform: uppercase;
      }
      #app-loader .loader-line {
        width: 120px; height: 2px; background: #ffffff; margin-bottom: 16px;
      }
      #app-loader .loader-subtitle { font-size: 12px; color: #737373; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
      #app-loader .loader-bar-track { width: 200px; height: 2px; background: #262626; border-radius: 4px; overflow: hidden; }
      #app-loader .loader-bar {
        height: 100%; width: 30%;
        background: linear-gradient(90deg, #404040, #ffffff, #404040);
        border-radius: 4px; animation: loader-slide 1.4s ease-in-out infinite;
      }
      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(250%); }
        100% { transform: translateX(-100%); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-title">RELIANCE</div>
      <div class="loader-line"></div>
      <div class="loader-subtitle">Fashion Management</div>
      <div class="loader-bar-track"><div class="loader-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.__removeLoader = function() {
        var loader = document.getElementById('app-loader');
        if (loader) { loader.classList.add('loaded'); setTimeout(function() { loader.remove(); }, 500); }
      };
      setTimeout(window.__removeLoader, 8000);
    </script>
  </body>
</html>
